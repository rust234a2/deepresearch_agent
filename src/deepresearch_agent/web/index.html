<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepResearch · 供应商工商研究</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="对话管理">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <rect x="1.2" y="1.2" width="23.6" height="23.6" rx="6.4" fill="var(--accent)"/>
          <circle cx="11.4" cy="11.4" r="5" fill="none" stroke="#fff" stroke-width="1.9"/>
          <line x1="15.2" y1="15.2" x2="19.6" y2="19.6" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
        <div>
          <div class="name">DeepResearch</div>
          <div class="sub">供应商工商研究</div>
        </div>
      </div>
      <button class="sidebar-new" id="newchat-side" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        新建对话
      </button>
      <div class="sidebar-heading">
        <span>历史对话</span>
        <span class="session-count" id="session-count">0</span>
      </div>
      <nav class="conversation-list" id="conversations" aria-label="历史对话列表">
        <p class="sidebar-empty">正在加载历史对话…</p>
      </nav>
      <p class="sidebar-note">对话按当前演示身份隔离保存。</p>
    </aside>

    <div class="app">
      <header class="bar">
        <button class="iconbtn sidebar-toggle" id="sidebar-toggle" title="打开对话列表" aria-label="打开对话列表" aria-expanded="false">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="mobile-brand">DeepResearch</div>
        <div class="spacer"></div>
        <button class="chip" id="identity" title="演示身份（无鉴权，点击可改名）">
          <span class="dot"></span><span>身份</span><span class="id" id="uid">demo</span>
        </button>
        <button class="iconbtn graph-toggle" id="graph-toggle" title="查看股权图谱" aria-label="查看股权图谱" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="2.6"/><circle cx="18" cy="7" r="2.6"/><circle cx="12" cy="18" r="2.6"/><path d="M7.8 7.4L10.5 16M16.4 8.8l-3 7.4M8.6 6.3l6.8.5"/></svg>
        </button>
        <button class="iconbtn" id="theme" title="切换主题" aria-label="切换主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="btn-primary compact-new" id="newchat" title="清空并开启新会话">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>新对话</span>
        </button>
      </header>

      <div class="stream" id="stream">
        <div class="thread" id="thread"></div>
      </div>

      <footer class="composer">
        <div class="composer-inner">
          <textarea id="q" rows="1" placeholder="输入供应商名称或追问，例如「核验示例科技股份有限公司」"></textarea>
          <button class="send" id="send" title="发送" aria-label="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l16-8-6 16-3-6-7-2z"/></svg>
          </button>
        </div>
        <div class="hint"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>
      </footer>
    </div>

    <aside class="graph-panel" id="graph-panel" aria-label="股权图谱线索">
      <div class="graph-head">
        <div>
          <div class="graph-title">股权图谱线索</div>
          <div class="graph-sub">线索级证据 · 须人工复核</div>
        </div>
        <button class="iconbtn graph-collapse" id="graph-collapse" title="收起图谱面板" aria-label="收起图谱面板">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="graph-legend" id="graph-legend" hidden>
        <span class="lg pill">企业</span>
        <span class="lg square">自然人</span>
        <span class="lg solid">持股 / 投资</span>
        <span class="lg dashed">控制线索</span>
        <span class="lg shared">同行业+同控制人</span>
      </div>
      <div class="graph-canvas-wrap">
        <svg id="graph-svg" role="img" aria-label="股权图谱子图"></svg>
        <div class="graph-tooltip" id="graph-tooltip" hidden></div>
        <p class="graph-empty" id="graph-empty">发起“哪些供应商互相关联”这类图谱检索后，这里会展示本次检索涉及的节点和边。</p>
      </div>
      <p class="graph-foot" id="graph-foot" hidden>部分直接股东/投资未展示。</p>
    </aside>
  </div>
  <script src="/static/graph.js" defer></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
